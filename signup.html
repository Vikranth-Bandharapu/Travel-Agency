<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Travel | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Page Loader -->
    <div id="page-loader">
        <img src="assets/logo.webp" alt="Loading...">
    </div>

    <!-- Back to Home -->
    <a href="index.html" style="position: absolute; top: 40px; left: 20px; color: #fff; z-index: 10; display: flex; align-items: center; gap: 5px; font-weight: 500; text-decoration: none;">
        <i class='bx bx-left-arrow-alt' style="font-size: 1.5rem;"></i> Back to Home
    </a>

    <div class="auth-page">
        <div class="auth-card" data-aos="zoom-in">
            <h2>Create an Account</h2>
            <p>Join Aura Travel and start planning your next journey.</p>
            
            <form class="auth-form" id="signupForm">
                <div id="errorMsg" style="color: #ffffff; font-size: 1rem; margin-bottom: 15px; display: none; background: #e74c3c; padding: 12px; border-radius: 5px; font-weight: bold; text-align: center;"></div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signupEmail" placeholder="hello@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Sign Up</button>
            </form>

            <div style="margin: 20px 0; display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.5); font-size: 0.8rem;">
                <div style="flex:1; height:1px; background: rgba(255,255,255,0.2);"></div>
                OR CONTINUE WITH
                <div style="flex:1; height:1px; background: rgba(255,255,255,0.2);"></div>
            </div>

            <div class="auth-social">
                <div class="btn-social"><i class='bx bxl-google'></i> Google</div>
                <div class="btn-social"><i class='bx bxl-apple'></i> Apple</div>
            </div>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (!name.trim() || !email.trim() || !password.trim()) {
                errorMsg.textContent = 'Please fill out all fields correctly.';
                errorMsg.style.display = 'block';
            } else if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters long.';
                errorMsg.style.display = 'block';
            } else {
                errorMsg.style.display = 'none';
                localStorage.setItem('userEmail', email);
                window.location.href = 'login.html';
            }
        });
    </script>

    <script>
        window.addEventListener("load", function() {
            setTimeout(function() {
                const loader = document.getElementById('page-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }
            }, 2000);
        });
    </script>
</body>
</html>
