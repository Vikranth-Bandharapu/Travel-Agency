<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Destination Not Found | Aura Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: url('assets/hero_bg_small.webp') center/cover no-repeat;
            position: relative;
            padding: 20px;
        }
        .error-page::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 35, 46, 0.7); /* Dark overlay */
            z-index: 1;
        }
        .error-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            width: 100%;
        }
        .error-code {
            font-size: 8rem;
            font-family: var(--font-heading);
            color: var(--color-accent);
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .error-title {
            font-size: 2.5rem;
            color: #1c7e8e; /* Match the dark cyan in the screenshot */
            font-family: var(--font-heading);
            margin-bottom: 25px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .error-desc {
            color: var(--color-white);
            margin-bottom: 40px;
            font-size: 1.2rem;
            font-weight: 300;
            line-height: 1.6;
        }
        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-back {
            display: inline-block;
            padding: 12px 35px;
            background-color: transparent;
            color: var(--color-white);
            font-weight: 500;
            border: 2px solid var(--color-white);
            border-radius: 50px;
            transition: var(--transition);
        }
        .btn-back:hover {
            background-color: rgba(255,255,255,0.1);
        }
        .btn-home {
            display: inline-block;
            padding: 14px 35px;
            background-color: var(--color-secondary); /* Dark cyan background */
            color: var(--color-white);
            font-weight: 600;
            border: none;
            border-radius: 50px;
            transition: var(--transition);
        }
        .btn-home:hover {
            background-color: var(--color-primary);
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">Destination Not Found</h1>
            <p class="error-desc">It looks like you've wandered off the map. This feature is still under construction.</p>
            <div class="btn-container">
                <a href="#" onclick="history.back(); return false;" class="btn-back">Go Back</a>
                <a href="index.html" class="btn-home">Return Home</a>
            </div>
        </div>
    </div>
</body>
</html>
